<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- 渐变定义 -->
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a" /> <!-- 深蓝 -->
      <stop offset="100%" stop-color="#3b82f6" /> <!-- 亮蓝 -->
    </linearGradient>
    <linearGradient id="wave-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.6" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="100%" stop-color="#93c5fd" stop-opacity="0.8" />
    </linearGradient>
    <!-- 发光滤镜 -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- 圆角矩形底板 -->
  <rect x="64" y="64" width="896" height="896" rx="200" fill="url(#bg-gradient)" />

  <!-- 内部背景网格 (科技感) -->
  <g stroke="#ffffff" stroke-opacity="0.08" stroke-width="4">
    <line x1="256" y1="64" x2="256" y2="960" />
    <line x1="512" y1="64" x2="512" y2="960" />
    <line x1="768" y1="64" x2="768" y2="960" />
    
    <line x1="64" y1="256" x2="960" y2="256" />
    <line x1="64" y1="512" x2="960" y2="512" />
    <line x1="64" y1="768" x2="960" y2="768" />
  </g>

  <!-- 中心发光波形数据线 -->
  <path 
    d="M 160 640 
       L 320 640 
       L 416 320 
       L 544 800 
       L 672 448 
       L 768 544 
       L 864 544" 
    fill="none" 
    stroke="url(#wave-gradient)" 
    stroke-width="56" 
    stroke-linecap="round" 
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- 关键数据点 (峰值/谷值圆点) -->
  <circle cx="416" cy="320" r="40" fill="#ffffff" filter="url(#glow)" />
  <circle cx="544" cy="800" r="40" fill="#93c5fd" filter="url(#glow)" />
  <circle cx="672" cy="448" r="40" fill="#ffffff" filter="url(#glow)" />
</svg>